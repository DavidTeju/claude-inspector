<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function () {
				var p = 'system';
				try {
					p = localStorage.getItem('theme-preference') || 'system';
				} catch (e) {}
				var dark =
					p === 'dark' ||
					(p === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (dark) document.documentElement.classList.add('dark');
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
			media="print"
			onload="this.media='all'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
				rel="stylesheet"
			/>
		</noscript>
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>"
		/>
		<title>Sessionaut</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-surface-950 text-text-100">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
